name: cloud_stage1_len512_lr1e4
seed: 42

paths:
  train_csv: data/interim/t0_train.csv
  test_csv: data/interim/t0_test.csv
  sample_submission_csv: data/raw/sample_submission.csv
  processed_dir: data/processed_byt5_chunks
  run_dir: runs/CLOUD_STAGE1_LEN512_LR1E4
  metadata_csv: deep-past-initiative-machine-translation/published_texts.csv

preprocess:
  apply_t0_normalize: false
  strip_text: true
  fold_inline_whitespace: true
  lowercase_source: false
  lowercase_target: false
  task_prefix: "translate Akkadian to English:"
  folds: 5
  group_strategy: auto

model:
  name: google/byt5-small
  max_source_length: 512
  max_target_length: 512

lora:
  target_modules: [q_proj, v_proj]
  r: 8
  alpha: 16
  dropout: 0.0
  bias: none

training:
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  gradient_accumulation_steps: 2
  learning_rate: 0.0001
  warmup_ratio: 0.05
  weight_decay: 0.0
  num_train_epochs: 30
  lr_scheduler_type: cosine
  fp16: false
  bf16: true
  gradient_checkpointing: true
  eval_fraction_of_epoch: 1.0
  logging_steps: 20
  save_total_limit: 2
  dataloader_num_workers: 0
  early_stopping_patience: 0
  predict_with_generate: false
  metric_for_best_model: eval_loss
  greater_is_better: false
  max_chunks_per_parent: 0
  parent_inverse_sample: false

generation:
  num_beams: 1
  length_penalty: 1.0
  max_new_tokens: 384
  min_new_tokens: 0
  no_repeat_ngram_size: 0
  suppress_extra_ids: true
  bad_tokens_regex: "<extra_id_\\d+>"
