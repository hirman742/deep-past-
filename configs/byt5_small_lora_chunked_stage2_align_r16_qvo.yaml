name: e8_byt5_stage2_align_r16_qvo
seed: 42

paths:
  train_csv: data/interim/t0_train.csv
  test_csv: data/interim/t0_test.csv
  sample_submission_csv: data/raw/sample_submission.csv
  processed_dir: data/processed_byt5_chunks_align
  run_dir: runs/E8_BYT5_STAGE2_ALIGN_R16_QVO
  metadata_csv: deep-past-initiative-machine-translation/published_texts.csv

preprocess:
  apply_t0_normalize: false
  strip_text: true
  fold_inline_whitespace: true
  lowercase_source: false
  lowercase_target: false
  task_prefix: "translate Akkadian to English:"
  folds: 5
  group_strategy: auto

model:
  name: google/byt5-small
  max_source_length: 384
  max_target_length: 384

lora:
  target_modules: [q_proj, v_proj, o_proj]
  r: 16
  alpha: 32
  dropout: 0.0
  bias: none

training:
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 4
  learning_rate: 0.0002
  warmup_ratio: 0.05
  weight_decay: 0.0
  num_train_epochs: 12
  lr_scheduler_type: cosine
  fp16: false
  bf16: true
  gradient_checkpointing: true
  eval_fraction_of_epoch: 1.0
  logging_steps: 20
  save_total_limit: 2
  dataloader_num_workers: 0
  early_stopping_patience: 0
  metric_for_best_model: geom
  greater_is_better: true
  max_chunks_per_parent: 4
  parent_inverse_sample: false

generation:
  num_beams: 1
  length_penalty: 1.0
  max_new_tokens: 256
  min_new_tokens: 0
  no_repeat_ngram_size: 0
  suppress_extra_ids: true
  bad_tokens_regex: "<extra_id_\\d+>"
